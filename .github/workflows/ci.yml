name: CI/CD Pipeline

on:
  push:
    branches: [ master, development ]
  pull_request:
    branches: [ master, development ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Für SonarQube wichtig

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Generate test report
        if: always()
        run: ./gradlew jacocoTestReport --no-daemon

      - name: Generate JaCoCo coverage badges
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: backend/build/reports/jacoco/test/jacocoTestReport.csv
          badges-directory: badges
          coverage-badge-filename: coverage.svg
          branches-badge-filename: branches.svg
          generate-coverage-badge: true
          generate-branches-badge: true

      - name: Commit and push coverage badges
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add badges/coverage.svg badges/branches.svg
          git diff --staged --quiet || git commit -m "chore: update coverage badges [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: backend/build/test-results/test/

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: backend/build/reports/jacoco/test/