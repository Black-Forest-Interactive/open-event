<div class="board-card flex flex-col rounded-xl overflow-hidden">
  <div class="board-card-header flex items-center gap-3 px-4 h-12 shrink-0">
    <span class="text-sm font-semibold tracking-tight">{{ title() | translate }}</span>
    <div class="flex-1"></div>
    <ng-content select="board-card-toolbar-actions"></ng-content>
  </div>
  <lib-loading-bar [reloading]="reloading()"/>
  <div class="flex-1">
    <ng-content/>
  </div>
</div>
