<div class="flex flex-col rounded-xl overflow-hidden border"
     style="border-color: var(--mat-sys-outline-variant); background: var(--mat-sys-surface-container-lowest)">
    <div class="flex items-center gap-3 px-4 h-12 shrink-0 border-b"
         style="border-color: var(--mat-sys-outline-variant); background: var(--mat-sys-surface-container-low); color: var(--mat-sys-on-surface)">
        <span class="text-sm font-semibold tracking-tight">{{ title() | translate }}</span>
        <div class="flex-1"></div>
        <ng-content select="board-card-toolbar-actions"></ng-content>
    </div>
    <lib-loading-bar [reloading]="reloading()"/>
    <div class="flex-1">
        <ng-content/>
    </div>
</div>
