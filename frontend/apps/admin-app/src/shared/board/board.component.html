<div class="sticky top-0 z-10 grid h-16 px-4 shrink-0 border-b"
     style="grid-template-columns: 1fr auto 1fr; background: var(--mat-sys-surface-container-lowest); border-color: var(--mat-sys-outline-variant)">
    <div class="flex items-center gap-1 overflow-hidden" style="color: var(--mat-sys-on-surface)">
        @if (showBack()) {
            <button (click)="back.emit(true)" mat-icon-button>
                <mat-icon>arrow_back</mat-icon>
            </button>
        }
        <span class="text-base font-semibold tracking-tight truncate">{{ title() | translate }}</span>
    </div>
    <div class="flex items-center py-3">
        @if (showSearch()) {
            <div class="w-80">
                <lib-board-search (search)="search.emit($event)" [placeholder]="searchPlaceholder()"/>
            </div>
        }
    </div>
    <div class="flex items-center justify-end gap-1">
        <ng-content select="board-toolbar-actions"></ng-content>
        @if (showReload()) {
            <button (click)="reload.emit(true)" mat-icon-button>
                <mat-icon>refresh</mat-icon>
            </button>
        }
    </div>
</div>
<div class="flex items-center gap-2 px-4"
     style="border-bottom: 1px solid var(--mat-sys-outline-variant); background: var(--mat-sys-surface-container-low)">
    <ng-content select="board-filters"></ng-content>
</div>
<lib-loading-bar [reloading]="reloading()"/>
<div class="p-6 flex flex-col gap-4">
    <ng-content/>
</div>
