<div class="bg-primary-default flex flex-row justify-between items-center p-4 gap-2">
    <div class="text-2xl font-bold">{{ "event.dialog.create.title" | translate }}</div>
    <div class="bg-accent-default rounded-sm px-4 py-1">{{ data.name }}</div>
</div>
<div mat-dialog-content>
    <lib-event-create
            (cancelled)="onCancelClick()"
            (created)="onCreated()"
            [addressReadAPI]="addressReadAPI"
            [audienceReadAPI]="audienceReadAPI"
            [categoryReadAPI]="categoryReadAPI"
            [eventReadAPI]="eventReadAPI"
    />
</div>
