<admin-board (search)="fullTextSearch = $event" (reload)="reload()" [reloading]="reloading"
             searchPlaceholder="account.search" title="account.title">
    <board-toolbar-actions>
        <button (click)="create()" color="accent" mat-flat-button>
            <mat-icon>new_label</mat-icon>
            {{ 'account.create' | translate }}
        </button>
    </board-toolbar-actions>
    <mat-card>
        <admin-account-table (createEvent)="createEvent($event)" (deleteEvent)="delete($event)" (editEvent)="edit($event)" (pageEvent)="handlePageChange($event)"
                             [data]="data"
                             [pageNumber]="pageNumber"
                             [pageSize]="pageSize"
                             [reloading]="reloading"
                             [totalElements]="totalElements"
        ></admin-account-table>
    </mat-card>
</admin-board>
