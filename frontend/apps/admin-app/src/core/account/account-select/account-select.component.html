<div class="flex flex-row gap-2 content-stretch items-center">
    <mat-form-field class="dense-1 flex-auto">
        <mat-label>{{ 'account.action.select' | translate }}</mat-label>
        <input #input (keyup)="keyUp.emit(input.value)" [matAutocomplete]="auto" matInput type="text">
        <!--    <mat-icon *ngIf="loading()">-->
        <!--      <mat-spinner diameter="18"></mat-spinner>-->
        <!--    </mat-icon>-->
        <mat-autocomplete #auto="matAutocomplete" autoActiveFirstOption>
            @for (a of accounts(); track a.id) {
                <mat-option (onSelectionChange)="select($event, a)" [value]="a.name">
                    {{ a.name }}
                </mat-option>
            }
        </mat-autocomplete>

    </mat-form-field>
</div>
