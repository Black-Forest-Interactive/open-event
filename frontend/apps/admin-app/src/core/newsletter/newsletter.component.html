<admin-board title="newsletter.title" [reloading]="reloading()" [showSearch]="false" (reload)="reload()">
    <board-toolbar-actions>
        @if (newsletterState.loaded()) {
            <admin-newsletter-status-button></admin-newsletter-status-button>
        }
    </board-toolbar-actions>
    <mat-card>
        <admin-newsletter-table [data]="data()" [reloading]="reloading()" [pageNumber]="pageNumber()" [pageSize]="pageSize()" [totalElements]="totalElements()" (pageEvent)="handlePageChange($event)"></admin-newsletter-table>
    </mat-card>
</admin-board>
