<h1 class="bg-primary-default" mat-dialog-title>{{ "registration.dialog.account.title" | translate }}</h1>
<div mat-dialog-content>
    <form [formGroup]="fg">
        <div class="flex flex-col gap-2 pt-4">
            <div class="flex flex-col gap-2">
                <admin-account-select (selectionChanged)="handleAccountSelectionChanged($event)"
                                      class="flex-auto items-stretch"/>
                <mat-form-field class="dense-1">
                    <mat-label>{{ "registration.peopleAmount" | translate }}</mat-label>
                    <input formControlName="size" matInput min="1" required type="number">
                </mat-form-field>
            </div>
        </div>
    </form>
</div>
<mat-dialog-actions align="end">
    <div class="flex flex-row gap-2">
        <button (click)="onSaveClick()" [disabled]="!fg.valid || !account" cdkFocusInitial color="primary"
                mat-stroked-button>
            <mat-icon>save</mat-icon>
            {{ "action.submit" | translate }}
        </button>
        <button (click)="onCancelClick()" color="warn" mat-stroked-button>
            <mat-icon>cancel</mat-icon>
            {{ "action.cancel" | translate }}
        </button>
    </div>
</mat-dialog-actions>
