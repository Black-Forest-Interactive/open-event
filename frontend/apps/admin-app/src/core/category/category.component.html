<admin-board (search)="fullTextSearch = $event" (reload)="reload()" [reloading]="reloading"
             searchPlaceholder="category.search" title="category.title">
    <board-toolbar-actions>
        <button (click)="create()" color="accent" mat-flat-button>
            <mat-icon>new_label</mat-icon>
            {{ 'category.create' | translate }}
        </button>
    </board-toolbar-actions>
    <mat-card>
        <admin-category-table (deleteEvent)="delete($event)" (editEvent)="edit($event)" (pageEvent)="handlePageChange($event)" [data]="data"
                              [pageNumber]="pageNumber"
                              [pageSize]="pageSize"
                              [reloading]="reloading"
                              [totalElements]="totalElements"
        ></admin-category-table>
    </mat-card>
</admin-board>
