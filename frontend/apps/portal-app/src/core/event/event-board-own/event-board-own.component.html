<div class="px-3 sm:px-4 pt-4 pb-1">
    <h1 class="text-2xl font-semibold text-on-surface">{{ 'event.board.intro.ownTitle' | translate }}</h1>
    <p class="text-sm text-on-surface-variant">{{ 'event.board.intro.ownSubtitle' | translate }}</p>
</div>

<div class="sticky top-0 z-10 flex flex-col gap-2 px-3 py-2 sm:px-4 border-b bg-surface-container-lowest border-outline-variant">
    <div class="flex items-center gap-2">
        <lib-board-search (search)="setQuery($event)" class="flex-auto max-w-lg" placeholder="event.search"></lib-board-search>

        <button color="accent" matButton="filled" routerLink="../create" class="hidden sm:flex shrink-0">
            <mat-icon>add</mat-icon>
            {{ 'event.create' | translate }}
        </button>

        <mat-button-toggle-group [hideSingleSelectionIndicator]="true" class="shrink-0">
            <mat-button-toggle (click)="layout.set('cards')" [attr.aria-label]="'event.board.cards' | translate" [checked]="layout() === 'cards'" value="cards">
                <mat-icon>grid_view</mat-icon>
            </mat-button-toggle>
            <mat-button-toggle (click)="layout.set('rows')" [attr.aria-label]="'event.board.rows' | translate" [checked]="layout() === 'rows'" value="rows">
                <mat-icon>view_list</mat-icon>
            </mat-button-toggle>
        </mat-button-toggle-group>
    </div>
</div>

<lib-loading-bar [reloading]="reloading()"></lib-loading-bar>

<div class="p-4 pb-20 lg:pb-4 max-w-[960px] mx-auto w-full">
    <portal-event-board-list [entries]="entries()" [reloading]="reloading()" [layout]="layout()" navView="own" [hasMoreElements]="hasMoreElements()" (nearEnd)="onScroll()"></portal-event-board-list>
</div>

<portal-event-board-navbar></portal-event-board-navbar>
