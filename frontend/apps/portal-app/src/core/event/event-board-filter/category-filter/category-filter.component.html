@if (categories().length > 0) {
    <div class="flex flex-col gap-2">
        <span class="text-sm font-semibold text-on-surface-variant">{{ 'event.filter.category' | translate }}</span>
        <div class="flex flex-wrap gap-2">
            @for (cat of categories(); track cat.id) {
                <button (click)="toggle.emit(cat.name)" [class.ring-2]="selected().has(cat.name)"
                        class="ring-primary ring-offset-1 ring-offset-surface rounded-lg" type="button">
                    <lib-category-chip [iconUrl]="cat.iconUrl" [name]="cat.name" size="md"></lib-category-chip>
                </button>
            }
        </div>
    </div>
}
