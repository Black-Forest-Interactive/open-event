@if (data() && owner()) {
  <h2 mat-dialog-title>{{ title() }}</h2>
  <mat-dialog-content>
    <div class="flex flex-row gap-2">
      <div class="flex flex-col gap-2">
        <portal-account [account]="owner()!!" [showUserName]="false"></portal-account>
      </div>
      <div class="flex flex-col gap-2">
        <div><p class="event-card-header-text">{{ owner()!! | accountDisplayName }}</p></div>
        <div><p class="event-card-header-text">{{ start() | date:'medium' }}</p></div>
      </div>
    </div>
  </mat-dialog-content>
  <mat-dialog-actions>
    <div class="flex flex-row gap-2">
      <button (click)="onDetailsClick()" color="primary" matButton="filled">
        <mat-icon>read_more</mat-icon>
        {{ "action.details" | translate }}
      </button>
      <button (click)="onCloseClick()" color="primary" matButton="filled">
        <mat-icon>close</mat-icon>
        {{ 'action.close' | translate }}
      </button>
    </div>
  </mat-dialog-actions>
}
