<div class="relative w-full h-[160px] sm:h-[220px] lg:h-[250px] overflow-hidden group">
    @if (hasImage()) {
        <img (error)="onImageError()" [src]="bannerUrl()" alt="Banner"
             class="w-full h-full object-cover transition-all duration-300 group-hover:brightness-90">
    } @else {
        <div [style.--h]="mediaStyle().hue" class="hero-placeholder w-full h-full flex items-center justify-center text-6xl">
            <mat-icon inline>{{ mediaStyle().icon }}</mat-icon>
        </div>
    }

    @if (categories().length > 0) {
        <div class="absolute top-3 left-3 flex flex-wrap gap-2">
            @for (cat of categories(); track cat.id) {
                <lib-category-chip [iconUrl]="cat.iconUrl" [name]="cat.name"></lib-category-chip>
            }
        </div>
    }

    <div class="absolute top-3 right-3 flex gap-2">
        <button (click)="toggleBookmark.emit()" class="!bg-black/40 hover:!bg-black/60 !backdrop-blur-sm" matIconButton>
            <mat-icon class="text-white">{{ isBookmarked() ? 'favorite' : 'favorite_border' }}</mat-icon>
        </button>
        @if (canEdit()) {
            <button (click)="fileInput.click()" [disabled]="isUploading()"
                    [matTooltip]="'event.action.editBanner' | translate" class="!bg-black/40 hover:!bg-black/60 !backdrop-blur-sm"
                    matIconButton matTooltipPosition="left">
                @if (!isUploading()) {
                    <mat-icon class="text-white">edit</mat-icon>
                } @else {
                    <mat-spinner class="text-white" diameter="20"></mat-spinner>
                }
            </button>
            <input #fileInput (change)="onImageSelected($event)" accept="image/*" class="hidden" type="file"/>
        }
    </div>

    @if (isUploading()) {
        <div class="absolute bottom-0 left-0 right-0 bg-black/50 backdrop-blur-sm p-2">
            <mat-progress-bar [value]="uploadPercentage()" mode="determinate"></mat-progress-bar>
            <div class="text-xs text-white mt-1 text-center">{{ 'event.message.uploading' | translate }} {{ uploadPercentage() }}%</div>
        </div>
    }
</div>
