<h2 mat-dialog-title class="!text-base !font-semibold">{{ 'event.dialog.editText.title' | translate }}</h2>
<lib-loading-bar [reloading]="loading()"></lib-loading-bar>

<mat-dialog-content class="!pt-2 !pb-2">
    <div class="flex flex-col gap-2 w-[310px]">
        <mat-form-field appearance="outline" class="w-full">
            <mat-label class="text-sm">{{ 'event.form.title' | translate }}</mat-label>
            <input matInput [ngModel]="title()" (ngModelChange)="title.set($event)" maxlength="40" autofocus>
            <mat-hint align="end" style="font-size: 11px; line-height: 1.3">{{ title().length }}/40</mat-hint>
        </mat-form-field>
        <mat-form-field appearance="outline" class="w-full" subscriptSizing="dynamic">
            <mat-label class="text-sm">{{ 'event.form.shortText' | translate }}</mat-label>
            <textarea matInput [ngModel]="shortText()" (ngModelChange)="shortText.set($event)" rows="2"></textarea>
        </mat-form-field>
        <mat-form-field appearance="outline" class="w-full" subscriptSizing="dynamic">
            <mat-label class="text-sm">{{ 'event.form.longText' | translate }}</mat-label>
            <textarea matInput [ngModel]="longText()" (ngModelChange)="longText.set($event)" rows="4"></textarea>
        </mat-form-field>
    </div>
</mat-dialog-content>

<mat-dialog-actions align="end" class="!pt-1">
    <button matButton [mat-dialog-close]="false">{{ 'action.cancel' | translate }}</button>
    <button matButton="filled" (click)="save()" [disabled]="saving() || loading()">{{ 'action.save' | translate }}</button>
</mat-dialog-actions>
