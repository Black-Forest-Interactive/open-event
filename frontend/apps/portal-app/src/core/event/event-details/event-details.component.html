<mat-card class="m-0 sm:!m-3 !pb-3 overflow-hidden lg:h-[calc(100vh-100px)]">
    <portal-event-details-banner [data]="info()"></portal-event-details-banner>
    <portal-event-details-header (changed)="reload()" [data]="info()"
                                 [reloading]="reloading()"></portal-event-details-header>
    <lib-loading-bar [reloading]="reloading()"></lib-loading-bar>
    @if (info()) {
        <div class="flex flex-col lg:flex-row gap-3 lg:justify-stretch lg:overflow-y-auto px-3 pt-3 pb-20 lg:pb-3">
            <div class="flex flex-col flex-auto min-w-0">
                <portal-event-details-info [info]="info()!"/>
                <portal-event-host-block [info]="info()!"/>
                @if (canEdit()) {
                    <portal-event-guest-list [info]="info()!"/>
                } @else if (registration()) {
                    <portal-event-participants-stack [info]="info()!" [userParticipant]="userParticipant()"/>
                }
                @if (canEdit() && share()) {
                    <portal-share-details (changed)="setSharingEnabled($event)" [info]="info()!"
                                          [reloading]="reloading()"/>
                }
            </div>
            <div class="flex flex-col gap-3 lg:w-80 lg:shrink-0 lg:sticky lg:top-3 lg:self-start">
                @if (registration()) {
                    <mat-card appearance="outlined">
                        <portal-registration-details (cancelParticipation)="cancelSelf()" (edit)="editSelf()" (participate)="participateSelf()"
                                                      [info]="info()!" [reloading]="registrationReloading()"
                                                      [userParticipant]="userParticipant()"/>
                    </mat-card>
                }
                @if (location()) {
                    <mat-card appearance="outlined">
                        <portal-event-details-location [info]="info()!"/>
                    </mat-card>
                }
            </div>
        </div>
    }
</mat-card>
@if (info() && registration()) {
    <portal-event-bookbar (cancelParticipation)="cancelSelf()" (edit)="editSelf()" (participate)="participateSelf()" [info]="info()!"
                          [reloading]="registrationReloading()" [userParticipant]="userParticipant()"/>
}
