@if (accessible()) {
    <button (click)="export()" [matTooltip]="'event.action.export' | translate" matIconButton>
        @if (exporting()) {
            <mat-icon>
                <mat-spinner diameter="18"></mat-spinner>
            </mat-icon>
        } @else {
            <mat-icon>download</mat-icon>
        }
    </button>
}
