<h2 mat-dialog-title>{{ "registration.dialog.cancel.title" | translate }}</h2>
<mat-dialog-content>
    <div class="flex flex-col gap-2">
        <p>{{ "registration.dialog.cancel.question" | translate }}</p>
    </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button (click)="submit()" color="primary" matButton="filled">
        <mat-icon>check</mat-icon>
        {{ "action.submit" | translate }}
    </button>
    <button color="warn" mat-dialog-close matButton="filled">
        <mat-icon>cancel</mat-icon>
        {{ "action.cancel" | translate }}
    </button>
</mat-dialog-actions>
