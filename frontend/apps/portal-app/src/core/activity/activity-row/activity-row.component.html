<div class="flex items-center gap-3 p-3">
    <div class="flex items-center justify-center w-10 h-10 rounded-[11px] bg-primary-container text-on-primary-container shrink-0 text-xl">
        <mat-icon inline>{{ icon() }}</mat-icon>
    </div>
    <div class="flex flex-col gap-0.5 flex-auto min-w-0">
        <span [class.font-semibold]="!info().read" class="text-sm truncate">{{ info().activity.title }}</span>
        <span class="flex items-center gap-3 text-xs text-on-surface-variant flex-wrap">
            <span>{{ 'activity.type.' + info().activity.type | translate }}</span>
            <span>{{ info().activity.actor.firstName }} {{ info().activity.actor.lastName }}</span>
            <span>{{ info().activity.timestamp | date: 'medium' }}</span>
        </span>
    </div>
    <portal-activity-read (changed)="changed.emit($event)" [info]="info()"></portal-activity-read>
</div>
