<div class="flex flex-col content-center px-5">
    @if (unreadMessages() <= 0) {
        <a mat-icon-button routerLink="/activity">
            <mat-icon>notifications</mat-icon>
        </a>
    } @else {
        <button (click)="clicked.emit($event)" mat-icon-button>
            <mat-icon matBadge="{{unreadMessages()}}" matBadgeColor="accent" matBadgeSize="small">notifications
            </mat-icon>
        </button>
    }
</div>
