<lib-loading-bar [reloading]="reloading()"></lib-loading-bar>
@if (items().length === 0 && !reloading()) {
    <div class="flex flex-col items-center justify-center gap-2 py-16 text-center text-on-surface-variant text-5xl">
        <mat-icon inline>notifications_none</mat-icon>
        <span class="text-lg font-semibold text-on-surface">{{ 'activity.empty.title' | translate }}</span>
        <span class="text-sm">{{ 'activity.empty.subtitle' | translate }}</span>
    </div>
}
@if (items().length > 0) {
    <div class="border-t border-outline-variant">
        @if (unread() > 0) {
            <div class="flex justify-end border-b border-outline-variant p-2">
                <button (click)="handleMarkAllReadClick()" matButton="text">
                    <mat-icon>mark_chat_read</mat-icon>
                    {{ 'activity.action.readAll' | translate }}
                </button>
            </div>
        }
        <div class="divide-y divide-outline-variant">
            @for (info of items(); track info.activity.id) {
                <portal-activity-row (changed)="handleReadStatusChanged($event)" [info]="info"></portal-activity-row>
            }
        </div>
    </div>
    <div class="border-t border-outline-variant">
        <mat-paginator (page)="handlePageChange($event)" [disabled]="reloading()" [length]="totalSize()"
                       [pageIndex]="pageIndex()" [pageSizeOptions]="[10, 25, 50, 100]" [pageSize]="pageSize()"
                       showFirstLastButtons></mat-paginator>
    </div>
}
