<div class="container mx-auto p-4 max-w-2xl">
  <mat-card>
    <div class="card-header flex items-center gap-3 py-4 px-6 rounded-t">
      <mat-icon>feedback</mat-icon>
      <span class="text-xl font-semibold">{{ 'feedback.title' | translate }}</span>
    </div>
    <lib-loading-bar [reloading]="loading()"></lib-loading-bar>
    <p class="card-intro px-6 pt-4 pb-0 text-sm">{{ 'feedback.introduction' | translate }}</p>
    <lib-feedback-form (request)="submit($event)"></lib-feedback-form>
  </mat-card>
</div>
