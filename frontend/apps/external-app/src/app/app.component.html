<div class="flex flex-col h-screen overflow-hidden">
    <lib-app-toolbar [showMenuToggle]="false" [title]="title()">
        <ng-container toolbar-right>
            @if (portalUrl()) {
                <a [href]="portalUrl()" mat-icon-button>
                    <mat-icon>login</mat-icon>
                </a>
            }
            <button [matMenuTriggerFor]="langMenu" mat-icon-button>
                <mat-icon>language</mat-icon>
            </button>
        </ng-container>
    </lib-app-toolbar>

    <div class="flex-1 min-h-0 overflow-y-auto overflow-x-hidden">
        <router-outlet></router-outlet>
    </div>

    <lib-app-footer></lib-app-footer>
</div>

<mat-menu #langMenu="matMenu">
    <button (click)="setLang('de')" [disabled]="currentLang() === 'de'" mat-menu-item>
        <span>🇩🇪</span> {{ 'lang.de' | translate }}
    </button>
    <button (click)="setLang('en')" [disabled]="currentLang() === 'en'" mat-menu-item>
        <span>🇬🇧</span> {{ 'lang.en' | translate }}
    </button>
</mat-menu>
