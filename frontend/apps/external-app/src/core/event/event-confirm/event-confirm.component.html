<div class="flex flex-col gap-2 items-center flex-auto">
    <lib-loading-bar [reloading]="loading()"></lib-loading-bar>
    @if (event()) {
        <div class="flex flex-col container gap-4 content-stretch w-full px-2 sm:px-4">
            <mat-card class="flex flex-col">
                <app-event-info [event]="event()!!" class="flex-auto"/>
            </mat-card>
            @if (confirmationPossible() && requireValidateCode()) {
                <mat-card>
                    <div class="header p-4 bg-gray-100 font-medium">{{ "registration.dialog.confirm.title" | translate }}</div>
                    <div class="flex flex-col items-center py-4 px-2 gap-2">
                        <p class="text-center text-gray-700">{{ "registration.dialog.confirm.question" | translate }}</p>
                        <lib-confirmation-code (codeComplete)="onCodeComplete($event)" [digitsLength]="5"/>
                    </div>
                </mat-card>
            }
        </div>
    }
</div>
