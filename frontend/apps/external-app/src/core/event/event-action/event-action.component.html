@if (participationPossible()) {
    <button (click)="participateEvent.emit()" class="w-full" color="accent" matButton="filled">
        @if (processing()) {
            <mat-spinner diameter="18" mode="indeterminate"></mat-spinner>
        } @else {
            <mat-icon>person_add</mat-icon>
        }
        {{ 'registration.action.participate' | translate }}
    </button>
}
