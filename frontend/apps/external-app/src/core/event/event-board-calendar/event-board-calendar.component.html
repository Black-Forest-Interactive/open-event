<div class="flex flex-col gap-7">
    @for (group of groups(); track group.date) {
        <section class="flex flex-col gap-3">
            <div class="flex items-center gap-3.5">
                <div class="flex items-center gap-2.5">
                    <span class="text-3xl font-medium text-primary leading-none">{{ group.date | date: 'd' }}</span>
                    <div class="flex flex-col text-xs uppercase tracking-wide text-on-surface-variant leading-tight">
                        <strong class="text-sm font-semibold text-on-surface normal-case">{{ group.date | date: 'EEE' }}</strong>
                        {{ group.date | date: 'MMM' }}
                    </div>
                </div>
                <span class="text-xs font-medium text-on-surface-variant bg-surface-container px-3 py-1 rounded-full whitespace-nowrap">
                    {{ group.entries.length }}× {{ 'event.type' | translate }}
                </span>
                <div class="flex-1 h-px bg-outline-variant"></div>
            </div>
            <div class="flex flex-col gap-3">
                @for (entry of group.entries; track entry.key) {
                    <app-event-row [event]="entry"></app-event-row>
                }
            </div>
        </section>
    }
</div>
