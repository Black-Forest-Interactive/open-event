@if (items().length > 0) {
    <div class="flex flex-col gap-2">
        <span class="text-sm font-semibold text-on-surface-variant">{{ 'event.filter.audience' | translate }}</span>
        <div class="flex flex-wrap gap-2">
            @for (item of items(); track item.id) {
                <button (click)="toggle.emit(item.name)" [class.!bg-primary]="selected().has(item.name)"
                        [class.!text-on-primary]="selected().has(item.name)" [class.ring-2]="selected().has(item.name)"
                        class="ring-primary rounded-full border border-outline-variant bg-surface-container px-3 py-1 text-sm" type="button">
                    {{ item.name }}
                </button>
            }
        </div>
    </div>
}
