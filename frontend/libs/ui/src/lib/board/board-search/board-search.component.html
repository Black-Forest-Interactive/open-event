<div class="search-pill flex items-center gap-2 px-3 w-full">
    <mat-icon class="shrink-0 text-[18px]">search</mat-icon>
    <input #input (keyup)="onKeyUp(input.value)" [placeholder]="placeholder() | translate"
           class="search-input flex-1 bg-transparent outline-none text-sm min-w-0">
    @if (input.value.length > 0) {
        <mat-icon (click)="clear(input)"
                  class="shrink-0 text-[18px] cursor-pointer opacity-60 hover:opacity-100 transition-opacity">close
        </mat-icon>
    }
</div>
