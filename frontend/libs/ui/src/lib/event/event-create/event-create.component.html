<mat-toolbar class="justify-center items-center">
    <div class="flex flex-row gap-2 flex-auto items-center container px-4">
        <button (click)="cancel()" mat-mini-fab>
            <mat-icon>arrow_back</mat-icon>
        </button>
        <span class="title ps-2">{{ "event.change.create" | translate }}</span>
        <div class="flex-auto"></div>
    </div>
</mat-toolbar>
<mat-card appearance="outlined" class="m-0 sm:!m-3 overflow-hidden">
    <lib-event-change
            (cancel)="cancel()"
            (request)="handleRequest($event)"
            [addressReadAPI]="this"
            [categoryReadAPI]="this"
            [eventReadAPI]="this"
            submitLabel="event.action.publish"
    >
    </lib-event-change>
</mat-card>
