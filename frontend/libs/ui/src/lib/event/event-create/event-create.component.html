<mat-toolbar>
    <div class="flex items-center gap-2 max-w-[680px] mx-auto w-full">
        <button (click)="cancel()" mat-mini-fab>
            <mat-icon>arrow_back</mat-icon>
        </button>
        <span class="ps-2 font-medium">{{ "event.change.create" | translate }}</span>
    </div>
</mat-toolbar>
<div class="max-w-[680px] mx-auto w-full">
    <lib-event-change
            (cancel)="cancel()"
            (request)="handleRequest($event)"
            [addressReadAPI]="this"
            [audienceReadAPI]="this"
            [categoryReadAPI]="this"
            [eventReadAPI]="this"
            submitLabel="event.action.publish"
    ></lib-event-change>
</div>
