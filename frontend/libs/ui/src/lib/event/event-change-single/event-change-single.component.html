<div class="flex flex-col gap-6 max-w-2xl mx-auto p-4">
    <section>
        <h3 class="text-sm font-semibold pb-2 mb-2 border-b border-outline-variant">{{ 'event.step.event' | translate }}</h3>
        <div class="flex flex-col gap-4">
            <lib-event-change-general [data]="info()" [hiddenFields]="hiddenFields()" [parent]="fg()"></lib-event-change-general>
        </div>
    </section>
    <section>
        <h3 class="text-sm font-semibold pb-2 mb-2 border-b border-outline-variant">{{ 'event.step.location' | translate }}</h3>
        <div class="flex flex-col gap-4">
            <lib-event-change-location [addressReadAPI]="addressReadAPI()" [data]="info()" [hiddenFields]="hiddenFields()" [parent]="fg()"></lib-event-change-location>
        </div>
    </section>
    <section>
        <h3 class="text-sm font-semibold pb-2 mb-2 border-b border-outline-variant">{{ 'event.step.registration' | translate }}</h3>
        <div class="flex flex-col gap-4">
            <lib-event-change-registration [audienceReadAPI]="audienceReadAPI()" [categoryReadAPI]="categoryReadAPI()" [data]="info()" [hiddenFields]="hiddenFields()" [parent]="fg()"></lib-event-change-registration>
        </div>
    </section>
    <div class="flex gap-3 justify-end">
        <button (click)="cancel.emit(true)" matButton="text" type="button">
            {{ 'action.cancel' | translate }}
        </button>
        <button (click)="submit.emit(true)" [disabled]="!fg().valid && !loading()" color="accent" matButton="filled" type="submit">
            <mat-icon>save</mat-icon>
            {{ submitLabel() | translate }}
        </button>
    </div>
</div>
