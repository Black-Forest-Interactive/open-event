<mat-toolbar class="!h-16 shrink-0 shadow-md z-10 bg-primary-toolbar">
    @if (showMenuToggle()) {
        <button (click)="menuToggle.emit()" [attr.aria-label]="'action.collapse' | translate" mat-icon-button
                type="button">
            <mat-icon>menu</mat-icon>
        </button>
    }
    @if (!showMenuToggle()) {
        <img alt="Logo" class="h-8 ml-2" src="/img/logo.png">
    }
    <span [class.text-base]="showMenuToggle()" [class.text-lg]="!showMenuToggle()"
          class="ml-2 font-medium truncate">{{ title() | translate }}</span>
    <span class="flex-1 min-w-2"></span>
    <ng-content select="[toolbar-right]"></ng-content>
    <button (click)="themeService.toggle()" [attr.aria-label]="'action.toggleTheme' | translate" mat-icon-button
            type="button">
        <mat-icon>{{ themeService.darkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>
</mat-toolbar>
