<mat-toolbar class="!h-16 shrink-0 shadow-md z-10 bg-primary-default">
  @if (showMenuToggle()) {
    <button mat-icon-button type="button" [attr.aria-label]="'action.collapse' | translate" (click)="menuToggle.emit()">
      <mat-icon>menu</mat-icon>
    </button>
  }
  <span class="ml-2 text-lg font-medium">{{ title() }}</span>
  <span class="flex-1"></span>
  <ng-content select="[toolbar-right]"></ng-content>
  <button mat-icon-button type="button" [attr.aria-label]="'action.toggleTheme' | translate" (click)="themeService.toggle()">
    <mat-icon>{{ themeService.darkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
</mat-toolbar>
